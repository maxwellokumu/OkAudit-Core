name: "segmentation-validator"
version: "1.0.0"
description: "Validates network segmentation by analysing firewall rules against defined network zones to detect unauthorised cross-zone traffic flows."
author: "IT Audit Team"
license: "MIT"
triggers:
  - keywords: ["network segmentation", "zone isolation", "DMZ", "inter-zone", "firewall zones", "network zones"]
  - patterns: ["validate.*segmentation", "check.*zones", "audit.*network.*isolation"]
parameters:
  - name: zones
    type: string
    required: true
    description: "Path to JSON zone definitions: {zone_name: [cidr1, cidr2, ...]}"
  - name: rules
    type: string
    required: true
    description: "Path to CSV firewall rules: source,destination,port,protocol,action"
execution:
  runtime: "python"
  command: "python main.py"
  args: ["--zones", "{{zones}}", "--rules", "{{rules}}"]

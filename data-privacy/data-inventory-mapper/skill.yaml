name: "data-inventory-mapper"
version: "1.0.0"
description: "Maps data assets across systems, generates Mermaid data flow diagrams, and classifies data types including Special Category data under GDPR."
author: "IT Audit Team"
license: "MIT"
triggers:
  - keywords: ["data inventory", "data map", "data flow", "personal data", "special category", "ROPA", "data register"]
  - patterns: ["map.*data.*flow", "inventory.*data", "classify.*data"]
parameters:
  - name: inventory
    type: string
    required: true
    description: "Path to CSV inventory: system,data_type,classification,location,transfers_to,legal_basis,retention_period"
  - name: output
    type: string
    required: false
    description: "Output format: mermaid, markdown, or both (default: both)"
execution:
  runtime: "python"
  command: "python main.py"
  args: ["--inventory", "{{inventory}}", "--output", "{{output}}"]

name: "physical-access-review"
version: "1.0.0"
description: "Audit physical badge access logs to detect after-hours access, failed attempts, tailgating, and anomalous patterns"
author: "IT Audit Team"
license: "MIT"
triggers:
  - keywords: ["badge access", "physical access", "tailgate", "door access", "after hours", "forced entry"]
  - patterns: [".*badge.*log.*", ".*physical.*access.*audit.*", ".*after.?hours.*access.*"]
parameters:
  - name: logs
    type: string
    required: true
    description: "Path to badge access log CSV"
  - name: hours
    type: string
    required: false
    description: "Business hours window HH:MM-HH:MM (default: 07:00-19:00)"
  - name: roles
    type: string
    required: false
    description: "Path to JSON file mapping badge_id to name, role, and allowed_doors"
  - name: failed-threshold
    type: integer
    required: false
    description: "Max failed attempts per hour before flagging (default: 3)"
execution:
  runtime: "python"
  command: "python main.py"
  args: ["--logs", "{{logs}}", "--roles", "{{roles}}"]

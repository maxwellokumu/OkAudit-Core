name: "evidence-tracker"
version: "1.0.0"
description: "Track audit evidence requests and collection status. Initialise from an audit program, update item status, list all items, filter by status, and export a final evidence summary."
author: "IT Audit Team"
license: "MIT"
triggers:
  - keywords: ["evidence tracker", "evidence collection", "audit evidence", "track evidence", "evidence status"]
  - patterns: ["track.*evidence", "evidence.*status", "audit.*evidence.*collect"]
parameters:
  - name: program
    type: string
    required: false
    description: "Path to audit_program.json (required for --init)"
  - name: init
    type: boolean
    required: false
    description: "Initialise tracker from audit program"
  - name: update
    type: string
    required: false
    description: "JSON string with update: {id, status, file, notes, reviewer}"
  - name: list
    type: boolean
    required: false
    description: "List all items and status"
  - name: export
    type: boolean
    required: false
    description: "Export evidence summary to evidence_summary.md"
execution:
  runtime: "python"
  command: "python main.py"
  args:
    - "--program"
    - "{{program}}"

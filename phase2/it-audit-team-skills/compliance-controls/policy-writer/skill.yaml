name: "policy-writer"
version: "1.0.0"
description: "Generate professional security policy documents aligned to SOC2, ISO27001, NIST, CIS, PCI-DSS, or GDPR. Covers password, access, encryption, incident response, and acceptable use topics."
author: "IT Audit Team"
license: "MIT"
triggers:
  - keywords: ["write policy", "security policy", "policy document", "policy template", "draft policy"]
  - patterns: ["generat.*policy", "write.*security.*policy", "create.*policy.*document"]
parameters:
  - name: framework
    type: string
    required: true
    description: "Compliance framework: SOC2, ISO27001, NIST, CIS, PCI-DSS, GDPR"
  - name: topic
    type: string
    required: true
    description: "Policy topic: password, access, encryption, incident-response, acceptable-use"
  - name: org_name
    type: string
    required: false
    description: "Organisation name to embed in the policy"
  - name: review_cycle
    type: string
    required: false
    description: "Review frequency (default: Annual)"
execution:
  runtime: "python"
  command: "python main.py"
  args:
    - "--framework"
    - "{{framework}}"
    - "--topic"
    - "{{topic}}"
    - "--org-name"
    - "{{org_name}}"

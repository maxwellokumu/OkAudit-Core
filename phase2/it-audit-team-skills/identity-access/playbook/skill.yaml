name: "iam-audit-playbook"
version: "1.0.0"
description: "Step-by-step IAM audit methodology covering user inventory, policy review, MFA verification, privileged account monitoring, SOD analysis, and reporting."
author: "IT Audit Team"
license: "MIT"
triggers:
  - keywords: ["iam playbook", "iam audit steps", "access management audit", "identity audit methodology"]
  - patterns: ["iam.*playbook", "identity.*audit.*step"]
parameters:
  - name: step
    type: string
    required: false
    description: "Step number (1-6) or 'full' (default: full)"
execution:
  runtime: "python"
  command: "python main.py"
  args:
    - "--step"
    - "{{step}}"

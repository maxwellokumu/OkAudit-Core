name: "compliance-checker"
version: "1.0.0"
description: "Compare system configuration JSON against CIS, SOC2, ISO27001, or PCI-DSS control libraries. Produces a pass/fail report with remediation guidance."
author: "IT Audit Team"
license: "MIT"
triggers:
  - keywords: ["compliance check", "CIS benchmark", "SOC2 compliance", "ISO 27001", "PCI DSS", "control assessment"]
  - patterns: ["compliance.*check", "assess.*against.*standard", "cis.*benchmark"]
parameters:
  - name: config
    type: string
    required: true
    description: "Path to JSON configuration file"
  - name: standard
    type: string
    required: true
    description: "Standard to check: cis, soc2, iso27001, or pci-dss"
execution:
  runtime: "python"
  command: "python main.py"
  args:
    - "--config"
    - "{{config}}"
    - "--standard"
    - "{{standard}}"

name: "privileged-account-monitor"
version: "1.0.0"
description: "Review privileged account activity logs for baseline exceedances, off-hours access, sensitive actions, and new unknown users. Supports local CSV/JSON and AWS CloudTrail."
author: "IT Audit Team"
license: "MIT"
triggers:
  - keywords: ["privileged account", "admin activity", "cloudtrail review", "off hours access", "sensitive actions"]
  - patterns: ["privileged.*monitor", "admin.*account.*review", "cloudtrail.*analys"]
parameters:
  - name: logs
    type: string
    required: false
    description: "Path to CSV or JSON log file (required for local mode)"
  - name: baseline
    type: integer
    required: false
    description: "Max actions per day before flagging (default: 100)"
  - name: hours
    type: string
    required: false
    description: "Business hours window HH:MM-HH:MM (default: 07:00-19:00)"
  - name: mode
    type: string
    required: false
    description: "Execution mode: local (default) or aws"
  - name: dry_run
    type: boolean
    required: false
    description: "Use bundled sample data"
execution:
  runtime: "python"
  command: "python main.py"
  args:
    - "--logs"
    - "{{logs}}"
    - "--baseline"
    - "{{baseline}}"
    - "--mode"
    - "{{mode}}"
